<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Fama Leads</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fama Leads">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<link rel="icon" href="icons/favicon-32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060d; --card:rgba(255,255,255,.045); --card-border:rgba(255,255,255,.08);
  --ink:#fff; --muted:rgba(255,255,255,.5); --muted2:rgba(255,255,255,.35); --muted3:rgba(255,255,255,.4);
  --header-grad:linear-gradient(160deg,#0d1b4d 0%,#16296e 55%,#1c3aa0 120%);
  --accent-grad:linear-gradient(135deg,#2e63ff,#6aa8ff);
  --avatar-grad:linear-gradient(135deg,#2e57d6,#5b93ff);
  --gold-grad:linear-gradient(135deg,#ffd76a,#ff8a5c);
  --accent:#6aa8ff; --accent2:#7fa8ff; --blue:#3b7dff; --cyan:#6ad4ff;
  --green:#00d29a; --green-bg:rgba(0,210,154,.08); --green-border:rgba(0,210,154,.2);
  --amber:#ffb238; --amber-bg:rgba(255,178,56,.12); --amber-border:rgba(255,178,56,.3);
  --red:#ff5c72; --red-bg:rgba(255,92,114,.06); --red-border:rgba(255,92,114,.25);
  --orange:#ff8a5c; --slate:#8aa0c8;
  --violet:#b38bff; --violet-bg:rgba(179,139,255,.14); --violet-border:rgba(179,139,255,.35);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;height:100dvh;overflow:hidden;}
body{
  font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(ellipse 900px 600px at 30% 0%, rgba(47,95,224,.16), transparent 60%),
    radial-gradient(ellipse 700px 500px at 80% 100%, rgba(0,210,154,.08), transparent 60%),
    var(--bg);
}
button,input,textarea,select{font-family:inherit;}
input,textarea,select{font-size:16px;} /* prevent iOS auto-zoom */
.sg{font-family:'Space Grotesk',sans-serif;}

#app{position:fixed;top:0;left:0;right:0;height:100dvh;height:var(--app-height, 100dvh);display:flex;flex-direction:column;background:transparent;}

/* TOPBAR */
.topbar{flex:0 0 auto;position:relative;overflow:hidden;padding:calc(var(--safe-t) + 16px) 18px 10px;background:var(--header-grad);color:#fff;}
.topbar::before{content:'';position:absolute;top:-70px;right:-50px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle, rgba(120,170,255,.45), transparent 70%);filter:blur(6px);pointer-events:none;}
.topbar-row{position:relative;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;}
.topbar-title .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.topbar-count{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;margin-top:2px;}
.searchbar{position:relative;margin-top:12px;}
.searchbar input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;}
.searchbar input::placeholder{color:rgba(255,255,255,.4);}
.chiprow{position:relative;display:flex;gap:7px;margin-top:11px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.chiprow::-webkit-scrollbar{display:none;}
.fchip{flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;background:rgba(255,255,255,.09);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.08);white-space:nowrap;}
.fchip.active{background:var(--accent-grad);color:#fff;border-color:transparent;}

/* DAILY GOAL PROGRESS */
.progress-wrap{position:relative;margin-top:13px;}
.progress-label{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:6px;}
.progress-label b{color:#fff;font-weight:800;}
.progress-track{height:6px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#3b7dff,#6ad4ff);box-shadow:0 0 10px rgba(106,212,255,.7);transition:width .3s ease;}
.progress-fill.hit{background:linear-gradient(90deg,#00d29a,#6ad4ff);box-shadow:0 0 10px rgba(0,210,154,.6);}

/* VIEWS */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view.active{display:block;}

/* LEAD LIST */
.leadlist{padding:12px 14px calc(90px + var(--safe-b));}
.leadcard{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.leadcard:active{background:rgba(255,255,255,.08);}
.lc-avatar{width:42px;height:42px;border-radius:13px;background:var(--avatar-grad);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#fff;flex:0 0 42px;}
.leadcard-main{flex:1;min-width:0;}
.leadcard-brand{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leadcard-sub{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leadcard-right{flex:0 0 auto;text-align:right;}
.lc-chevron{flex:0 0 auto;font-size:20px;color:rgba(255,255,255,.25);}
.lc-wabtn{flex:0 0 auto;width:32px;height:32px;border-radius:10px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);font-size:15px;display:grid;place-items:center;}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
.badge-new{background:rgba(59,124,255,.15);color:var(--accent2);}
.badge-progress{background:var(--amber-bg);color:var(--amber);}
.badge-dm{background:var(--green-bg);color:var(--green);}
.badge-dead{background:var(--red-bg);color:var(--red);}
.badge-closed{background:var(--violet-bg);color:var(--violet);}
.badge-slate{background:rgba(138,160,200,.15);color:var(--slate);}
.badge-orange{background:rgba(255,138,92,.15);color:var(--orange);}
.leadcard-days{font-size:10.5px;color:var(--muted2);margin-top:6px;}
.empty-state{text-align:center;padding:70px 30px;color:var(--muted);}
.empty-state-emoji{font-size:44px;margin-bottom:10px;}
.empty-state-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:6px;}
.empty-state-body{font-size:13.5px;line-height:1.6;}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(78px + var(--safe-b));width:56px;height:56px;border-radius:999px;background:var(--accent-grad);color:#fff;border:none;font-size:28px;font-weight:400;box-shadow:0 8px 24px rgba(46,99,255,.5), 0 0 0 1px rgba(255,255,255,.12) inset;display:grid;place-items:center;z-index:50;}
.fab:active{transform:scale(.94);}

/* TAB BAR */
.tabbar{flex:0 0 auto;display:flex;background:rgba(8,12,26,.85);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);padding:8px 0 calc(6px + var(--safe-b));position:relative;z-index:40;}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:6px 0;color:rgba(255,255,255,.4);}
.tabbtn.active{color:var(--accent);}
.tabbtn .ic{font-size:19px;line-height:1;}
.tabbtn .lb{font-size:10px;font-weight:700;}

/* SCREEN OVERLAY (lead detail, call log, full screen push) */
.screen{position:fixed;top:0;left:0;right:0;height:100dvh;height:var(--app-height, 100dvh);background:var(--bg);z-index:100;display:none;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.screen.open{display:flex;transform:translateX(0);}
.screen-header{flex:0 0 auto;position:relative;overflow:hidden;background:var(--header-grad);color:#fff;padding:calc(var(--safe-t) + 14px) 14px 14px;display:flex;align-items:center;gap:10px;}
.iconbtn{width:34px;height:34px;border-radius:11px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:17px;display:grid;place-items:center;flex:0 0 34px;}
.screen-header-title{flex:1;min-width:0;}
.screen-header-brand{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.screen-header-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:1px;}
.screen-body{flex:1;overflow-y:auto;padding:14px 16px calc(30px + var(--safe-b));-webkit-overflow-scrolling:touch;}

/* RESOLVED / DEAD BANNERS */
.resolved-card{background:var(--green-bg);border:1px solid var(--green-border);border-radius:18px;padding:18px;text-align:center;}
.resolved-card .big{font-size:30px;margin-bottom:6px;}
.resolved-card .t{font-weight:800;color:var(--green);font-size:15px;}
.deadcard{background:var(--red-bg);border:1px solid var(--red-border);border-radius:18px;padding:16px;text-align:center;color:var(--red);font-size:13.5px;}
.closedcard{background:linear-gradient(160deg, rgba(255,215,106,.14), rgba(255,138,92,.08));border:1px solid rgba(255,183,56,.35);border-radius:18px;padding:18px;text-align:center;}
.closedcard .big{font-size:30px;margin-bottom:6px;}
.closedcard .amt{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-top:4px;}
.closedcard .pkg{font-size:12px;color:var(--muted);margin-top:4px;}
.curcard{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:18px;text-align:center;}
.curcard-actions{display:flex;gap:9px;margin-top:14px;}
.pillbtn{flex:1;padding:11px;border-radius:12px;border:none;font-size:13.5px;font-weight:800;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.pillbtn-call{background:var(--accent-grad);color:#fff;box-shadow:0 6px 16px rgba(46,99,255,.35);}
.pillbtn-wa{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.pillbtn-save{background:var(--violet-bg);color:var(--violet);border:1px solid var(--violet-border);}
.curcard-phone{display:block;font-size:19px;font-weight:800;color:var(--accent2);text-decoration:none;margin-top:4px;}
.curcard-role{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;background:rgba(59,124,255,.15);color:var(--accent2);margin-bottom:6px;}
.logbtn{display:block;width:100%;margin-top:16px;padding:14px;border-radius:13px;border:none;background:var(--accent-grad);color:#fff;font-size:14.5px;font-weight:800;}

.section-label{font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted3);margin:20px 0 9px;}

/* CONTACT TREE */
.node-list{display:flex;flex-direction:column;}
.node-card{position:relative;display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:12px 14px;margin:6px 0;}
.node-card:active{background:rgba(255,255,255,.08);}
.node-card.target{border:1px solid var(--violet-border);background:var(--violet-bg);}
.node-seq{width:24px;height:24px;border-radius:999px;background:rgba(59,124,255,.18);color:var(--accent2);font-size:11px;font-weight:700;display:grid;place-items:center;flex:0 0 24px;margin-top:1px;font-family:'Space Grotesk',sans-serif;}
.node-card.target .node-seq{background:var(--violet);color:#1a0f2e;}
.node-main{flex:1;min-width:0;}
.node-name{font-size:14.5px;font-weight:700;color:var(--ink);}
.node-role{font-size:11.5px;color:var(--muted);margin-top:1px;}
.node-phone{font-size:11.5px;color:var(--accent2);margin-top:2px;font-weight:600;}
.node-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.node-children{margin-left:27px;border-left:2px dashed rgba(255,255,255,.12);padding-left:14px;}

.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.fi{width:100%;padding:12px 13px;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.04);outline:none;color:var(--ink);}
.fi:focus{border-color:var(--blue);background:rgba(59,124,255,.08);}
.fi::placeholder{color:rgba(255,255,255,.32);}
textarea.fi{min-height:70px;resize:vertical;}
select.fi{-webkit-appearance:none;appearance:none;}
.rowbtns{display:flex;gap:10px;}
.rowbtns .fg{flex:1;}

.miniaction{display:flex;gap:9px;margin-top:18px;}
.miniaction button{flex:1;padding:11px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);font-size:12.5px;font-weight:700;color:var(--muted);}
.miniaction button.danger{color:var(--red);border-color:var(--red-border);background:var(--red-bg);}
.miniaction button.revive{color:var(--green);border-color:var(--green-border);}

/* BOTTOM SHEETS */
.sheet-scrim{position:fixed;inset:0;background:rgba(2,4,12,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.sheet-scrim.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:#11162c;border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:26px 26px 0 0;z-index:210;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -20px 50px rgba(0,0,0,.5);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;margin:10px auto 4px;}
.sheet-title{font-size:17px;font-weight:800;padding:8px 20px 4px;color:var(--ink);}
.sheet-body{padding:6px 20px calc(24px + var(--safe-b));overflow-y:auto;}
.sheet-save{display:block;width:100%;padding:14px;border-radius:13px;border:none;background:var(--accent-grad);color:#fff;font-size:15px;font-weight:800;margin-top:6px;box-shadow:0 8px 20px rgba(46,99,255,.4);}
.sheet-cancel{display:block;width:100%;padding:12px;border-radius:13px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:700;text-align:center;}

.outcomelist{display:flex;flex-direction:column;gap:8px;}
.ocbtn{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:14px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);text-align:left;font-size:14.5px;font-weight:700;color:var(--ink);width:100%;}
.ocbtn .ic{font-size:20px;flex:0 0 24px;}
.ocbtn.ok{border-color:var(--green-border);background:var(--green-bg);}
.ocbtn.warn{border-color:var(--amber-border);background:var(--amber-bg);}
.ocbtn.bad{border-color:var(--red-border);background:var(--red-bg);}

/* CALL LOG */
.calllog{display:flex;flex-direction:column;gap:0;}
.cl-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.cl-row:last-child{border-bottom:none;}
.cl-time{font-size:11.5px;color:var(--muted2);}
.cl-full-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--card-border);border-radius:15px;padding:13px 14px;margin-bottom:9px;}
.cl-full-main{min-width:0;flex:1;}
.cl-full-brand{font-size:14.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cl-full-name{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cl-full-right{flex:0 0 auto;text-align:right;}
.cl-full-time{font-size:10.5px;color:var(--muted2);margin-top:5px;}

/* STATS — blue gradient analytics page */
.statshead{position:relative;overflow:hidden;padding:calc(var(--safe-t) + 20px) 18px 8px;color:#fff;background:var(--header-grad);}
.statshead::before{content:'';position:absolute;top:-70px;right:-50px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle, rgba(120,170,255,.45), transparent 70%);filter:blur(6px);pointer-events:none;}
.statshead-row{position:relative;display:flex;align-items:center;justify-content:space-between;}
.statshead-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;}
.statshead-sub{position:relative;font-size:12.5px;color:rgba(255,255,255,.6);margin-top:2px;}
.statsbody{padding:16px 14px calc(90px + var(--safe-b));}

.period-chips{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.period-chips::-webkit-scrollbar{display:none;}
.pchip{flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;background:var(--card);color:var(--muted);border:1px solid var(--card-border);white-space:nowrap;}
.pchip.active{background:var(--accent-grad);color:#fff;border-color:transparent;}

.revenue-hero{position:relative;overflow:hidden;border-radius:20px;padding:20px;margin-bottom:12px;background:linear-gradient(160deg, rgba(255,215,106,.16) 0%, rgba(255,138,92,.08) 100%);border:1px solid rgba(255,183,56,.3);}
.revenue-hero-label{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:rgba(255,215,106,.85);}
.revenue-hero-amt{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;margin-top:6px;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.revenue-hero-sub{font-size:12px;color:var(--muted);margin-top:4px;}

.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.stattile{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:16px;}
.stattile.green{background:var(--green-bg);border-color:var(--green-border);}
.stattile.violet{background:var(--violet-bg);border-color:var(--violet-border);}
.stattile-label{font-size:11px;font-weight:700;color:var(--muted3);text-transform:uppercase;letter-spacing:.3px;}
.stattile-val{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--ink);margin-top:5px;letter-spacing:-.02em;}
.stattile-sub{font-size:11px;color:var(--muted2);margin-top:3px;}
.stattile.wide{grid-column:span 2;}

.ratecard{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:18px;margin-bottom:11px;}
.ratecard-label{font-size:11px;font-weight:700;color:var(--muted3);text-transform:uppercase;letter-spacing:.3px;}
.ratecard-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-top:6px;}
.ratecard-val.green{color:var(--green);}
.ratecard-val.amber{color:var(--amber);}
.ratecard-sub{font-size:11.5px;color:var(--muted2);margin-top:2px;margin-bottom:10px;}
.ratebar-track{height:6px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;}
.ratebar-fill{height:100%;border-radius:999px;}
.ratebar-fill.green{background:linear-gradient(90deg,#00d29a,#6ad4ff);}
.ratebar-fill.amber{background:linear-gradient(90deg,#ffb238,#ff8a5c);}

.calllog-entry{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:16px 18px;margin-bottom:11px;}
.calllog-entry-l{font-size:14px;font-weight:700;color:var(--ink);}
.calllog-entry-r{font-size:20px;color:var(--muted2);}

/* SETTINGS */
.setshead{padding:calc(var(--safe-t) + 20px) 18px 8px;}
.setshead-title{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;color:var(--ink);}
.settingswrap{padding:6px 16px calc(90px + var(--safe-b));}
.setcard{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:18px;margin-bottom:14px;}
.setcard-title{font-size:14px;font-weight:800;margin-bottom:4px;color:var(--ink);}
.setcard-body{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:12px;}
.setbtn{display:block;width:100%;padding:12px;border-radius:12px;border:none;font-size:13.5px;font-weight:800;text-align:center;margin-bottom:8px;}
.setbtn:last-child{margin-bottom:0;}

<script>
// ───────────────────────────── STORAGE ─────────────────────────────
const STORE_KEY = 'fama_leads_v1';
let data = { leads: [], meetings: [], settings: { dailyTarget: 50 }, lastBackupAt: null };

const PACKAGES = [
  { id: 'starter_7500_3mo', label: '7,500 EGP — 3 Months Upfront', amount: 7500 },
];

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const nowISO = () => new Date().toISOString();
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function daysAgo(iso){ if(!iso) return null; return Math.floor((Date.now() - new Date(iso)) / 86400000); }
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' · ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtTime12(hhmm){
  if (!hhmm) return '—';
  const [h,m] = hhmm.split(':').map(Number);
  const d = new Date(); d.setHours(h,m,0,0);
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtTimeRange12(start,end){
  return end ? `${fmtTime12(start)} – ${fmtTime12(end)}` : fmtTime12(start);
}
function toDateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr(){ return toDateStr(new Date()); }
function tomorrowStr(){ const d = new Date(); d.setDate(d.getDate()+1); return toDateStr(d); }
function fmtCalDate(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function initials(str){
  return (str || '').trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase() || '?';
}
function money(n){ return (n||0).toLocaleString('en-US') + ' EGP'; }

// Egyptian numbers are entered locally (e.g. 01012345678); WhatsApp needs the +20
// country code with no leading 0, so normalize before building any wa.me link.
function waDigits(phone){
  let p = String(phone || '').replace(/\D/g,'');
  if (!p) return '';
  if (p.startsWith('20')) return p;
  if (p.startsWith('0')) p = p.slice(1);
  return '20' + p;
}
function waLink(phone, text){
  const d = waDigits(phone);
  if (!d) return '';
  return `https://wa.me/${d}${text ? '?text=' + encodeURIComponent(text) : ''}`;
}

// vCard 3.0 requires backslash-escaping ; , \ and literal newlines in text fields
function escVCard(s){
  return String(s || '').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
// Opens iOS's native "Add Contact" screen pre-filled via a text/vcard data URI —
// a website can't write to Contacts directly, this is the standard workaround.
function saveContactToPhone(){
  const l = data.leads.find(x => x.id === selLeadId); if (!l) return;
  const n = findNode(l.root, selNodeId); if (!n) return;
  const displayName = [n.name, n.role, l.brand, l.area].filter(Boolean).join(' · ');
  const phoneDigits = (n.phone || '').replace(/\D/g,'');
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N:;${escVCard(displayName)};;;`,
    `FN:${escVCard(displayName)}`,
    'ORG:Fama 3',
    phoneDigits ? `TEL;TYPE=CELL:${phoneDigits}` : '',
    'END:VCARD',
    ''
  ].filter(Boolean).join('\r\n');
  // A data: URI navigation is handed off to Contacts by full Safari, but the
  // stripped-down WKWebView an installed home-screen PWA runs in doesn't do that
  // handoff — it just tries to render the URI as a blank page. A Blob + download
  // attribute goes through iOS's normal file-download pipeline instead, which
  // does get handed off correctly even in standalone/installed mode.
  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(n.name || 'contact').replace(/[\\/:*?"<>|]/g,'')}.vcf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

// migrate a lead from the old flat `chain` array to the contact tree (`root` + nested `children`)
function migrateLead(l){
  if (l.root !== undefined) return l; // already tree format
  const chain = Array.isArray(l.chain) ? l.chain : [];
  let root = null, cursor = null;
  chain.forEach(c => {
    const node = {
      id: uid(), name: c.name || '', role: c.role || '', phone: c.phone || '', note: c.note || '',
      outcome: c.outcome === 'referred' ? null : (c.outcome === 'reached_dm' ? 'reached' : (c.outcome || null)),
      loggedAt: c.loggedAt || null,
      isTarget: c.outcome === 'reached_dm',
      createdAt: c.loggedAt || l.createdAt || nowISO(),
      children: [], callLog: [],
    };
    if (!root) root = node; else cursor.children.push(node);
    cursor = node;
  });
  delete l.chain;
  l.root = root;
  return l;
}
function ensureNodeDefaults(n){
  if (!n) return;
  if (!Array.isArray(n.callLog)) n.callLog = [];
  if (n.callLog.length === 0 && n.outcome && n.loggedAt) n.callLog.push({ outcome: n.outcome, at: n.loggedAt });
  n.children.forEach(ensureNodeDefaults);
}
function ensureLeadDefaults(l){
  if (l.closedSale === undefined) l.closedSale = null;
  if (l.root) ensureNodeDefaults(l.root);
  return l;
}

function load(){
  try { data = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch { data = {}; }
  if (!Array.isArray(data.leads)) data.leads = [];
  if (!Array.isArray(data.meetings)) data.meetings = [];
  if (!data.settings || typeof data.settings !== 'object') data.settings = {};
  if (typeof data.settings.dailyTarget !== 'number' || data.settings.dailyTarget <= 0) data.settings.dailyTarget = 50;
  if (!('lastBackupAt' in data)) data.lastBackupAt = null;
  data.leads = data.leads.map(migrateLead).map(ensureLeadDefaults);
  save();
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

const NODE_OUTCOME_META = {
  no_answer:      { label: 'No Answer',                       cls: 'badge-slate' },
  wrong_number:   { label: 'Wrong Number',                    cls: 'badge-orange' },
  refused:        { label: 'Refused',                         cls: 'badge-dead' },
  callback:       { label: 'Callback Later',                  cls: 'badge-progress' },
  reached:        { label: 'Reached',                         cls: 'badge-dm' },
  reached_admin:  { label: 'Reached the Administration',      cls: 'badge-dm' },
  no_details:     { label: "Doesn't Have Further Details",    cls: 'badge-slate' },
  will_get_back:  { label: 'Will Get Back If Interested',     cls: 'badge-progress' },
};

// ───────────────────────────── TREE HELPERS ─────────────────────────────
function findNode(node, id){
  if (!node) return null;
  if (node.id === id) return node;
  for (const c of node.children) { const f = findNode(c, id); if (f) return f; }
  return null;
}
function removeNodeFromTree(node, id){
  if (!node) return;
  node.children = node.children.filter(c => c.id !== id);
  node.children.forEach(c => removeNodeFromTree(c, id));
}
function flattenOrdered(root){
  const out = [];
  function walk(n){
    out.push(n);
    n.children.slice().sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt)).forEach(walk);
  }
  if (root) walk(root);
  return out;
}
function findTargetReached(node){
  if (!node) return false;
  if (node.isTarget && node.outcome === 'reached') return true;
  return node.children.some(findTargetReached);
}
function findTargetNode(node){
  if (!node) return null;
  if (node.isTarget && node.outcome === 'reached') return node;
  for (const c of node.children) { const f = findTargetNode(c); if (f) return f; }
  return null;
}

// ───────────────────────────── LEAD HELPERS ─────────────────────────────
function leadStatus(lead){
  if (lead.dead) return 'dead';
  if (lead.closedSale) return 'closed';
  if (!lead.root) return 'new';
  if (findTargetReached(lead.root)) return 'reached_dm';
  if (lead.root.outcome === null && lead.root.children.length === 0) return 'new';
  return 'in_progress';
}
function lastCallOutcome(lead){
  if (!lead.root) return null;
  const logs = [];
  flattenOrdered(lead.root).forEach(n => n.callLog.forEach(c => logs.push(c)));
  if (!logs.length) return null;
  logs.sort((a,b) => new Date(b.at) - new Date(a.at));
  return logs[0].outcome;
}
function statusMeta(status){
  return {
    new:          { label: 'New',          cls: 'badge-new' },
    in_progress:  { label: 'In Progress',  cls: 'badge-progress' },
    reached_dm:   { label: 'Reached DM',   cls: 'badge-dm' },
    closed:       { label: '💰 Closed',    cls: 'badge-closed' },
    dead:         { label: 'Dead',         cls: 'badge-dead' },
  }[status];
}
function allCallEntries(lead){
  const out = [];
  if (lead.root) flattenOrdered(lead.root).forEach(n => n.callLog.forEach(c => out.push(c)));
  return out;
}
function lastTouchISO(lead){
  const dates = allCallEntries(lead).map(c => c.at);
  if (lead.closedSale) dates.push(lead.closedSale.closedAt);
  if (!dates.length) return lead.createdAt;
  return dates.reduce((a,b) => new Date(a) > new Date(b) ? a : b);
}
function leadsAddedToday(){
  const today = new Date(); today.setHours(0,0,0,0);
  return data.leads.filter(l => new Date(l.createdAt) >= today).length;
}

// ───────────────────────────── CALENDAR ─────────────────────────────
let calViewDate = new Date();          // month currently shown in the grid
let selectedCalDate = todayStr();      // date selected in the grid
let smEditingId = null;                // meeting id currently being edited, or null when creating

function meetingsOn(dateStr){
  return data.meetings.filter(m => m.date === dateStr).sort((a,b) => a.startTime.localeCompare(b.startTime));
}

function renderCalendar(){
  const wrap = document.getElementById('calendarBody');
  const y = calViewDate.getFullYear(), m = calViewDate.getMonth();
  const monthLabel = calViewDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const startOffset = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const meetingDates = new Set(data.meetings.map(mt => mt.date));

  let cells = '';
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  for (let i = 0; i < totalCells; i++){
    const dayNum = i - startOffset + 1;
    let cellDate, otherMonth = false;
    if (dayNum < 1){ cellDate = new Date(y, m-1, daysInPrevMonth + dayNum); otherMonth = true; }
    else if (dayNum > daysInMonth){ cellDate = new Date(y, m+1, dayNum - daysInMonth); otherMonth = true; }
    else { cellDate = new Date(y, m, dayNum); }
    const ds = toDateStr(cellDate);
    const isToday = ds === todayStr();
    const isSelected = ds === selectedCalDate;
    const hasMeeting = meetingDates.has(ds);
    cells += `<div class="cal-day ${otherMonth?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectCalDate('${ds}')">
      <span>${cellDate.getDate()}</span>
      ${hasMeeting ? '<span class="cal-day-dot"></span>' : ''}
    </div>`;
  }
  const weekdays = ['S','M','T','W','T','F','S'].map(w => `<div class="cal-weekday">${w}</div>`).join('');

  const todayMeetings = meetingsOn(todayStr());
  const tomorrowMeetings = meetingsOn(tomorrowStr());
  const showSelectedSection = selectedCalDate !== todayStr() && selectedCalDate !== tomorrowStr();
  const selectedMeetings = showSelectedSection ? meetingsOn(selectedCalDate) : [];

  wrap.innerHTML = `
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="calShiftMonth(-1)">‹</button>
      <div class="cal-navlabel">${monthLabel}</div>
      <button class="cal-navbtn" onclick="calShiftMonth(1)">›</button>
    </div>
    <div class="cal-grid">${weekdays}${cells}</div>

    <div class="section-label">Today's Meetings</div>
    ${renderMeetingList(todayMeetings, 'today')}

    <div class="section-label">Tomorrow — Confirm</div>
    ${renderMeetingList(tomorrowMeetings, 'tomorrow')}

    ${showSelectedSection ? `
      <div class="section-label">${fmtCalDate(selectedCalDate)}</div>
      ${renderMeetingList(selectedMeetings, 'selected')}
    ` : ''}

    <button class="mtg-addbtn" onclick="openScheduleMeeting(selectedCalDate)">+ Schedule Meeting</button>
  `;
}

function renderMeetingList(meetings, mode){
  if (!meetings.length){
    const msgs = { today: 'No meetings today.', tomorrow: 'Nothing to confirm.', selected: 'No meetings on this day.' };
    return `<div class="empty-state" style="padding:26px 20px;"><div class="empty-state-body">${msgs[mode]}</div></div>`;
  }
  const STATUS_BADGE = { confirmed: 'badge-dm', cancelled: 'badge-dead', done: 'badge-closed', scheduled: 'badge-new' };
  return meetings.map(mt => {
    const rightHtml = (mode === 'tomorrow' && mt.status !== 'confirmed')
      ? `<button class="mtg-confirmbtn" onclick="event.stopPropagation();confirmMeeting('${mt.id}')">Confirm</button>`
      : `<span class="badge ${STATUS_BADGE[mt.status] || 'badge-new'}">${mt.status}</span>`;
    const contactHtml = mt.contactName
      ? `<div class="mtg-row-contact">👤 ${esc(mt.contactName)}${mt.contactPhone ? ` · <a href="tel:${mt.contactPhone.replace(/\D/g,'')}" onclick="event.stopPropagation()">${esc(mt.contactPhone)}</a>` : ''}</div>`
      : '';
    return `<div class="mtg-row" onclick="openScheduleMeeting(null,'${mt.id}')">
      <div class="mtg-row-main">
        <div class="mtg-row-brand">${esc(mt.brand)}</div>
        <div class="mtg-row-loc">${esc(mt.location || 'No location set')}</div>
        ${contactHtml}
        <div class="mtg-row-time">${fmtTimeRange12(mt.startTime, mt.endTime)}</div>
      </div>
      <div class="mtg-row-right">${rightHtml}</div>
    </div>`;
  }).join('');
}

function selectCalDate(ds){ selectedCalDate = ds; renderCalendar(); }
function calShiftMonth(delta){ calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+delta, 1); renderCalendar(); }

// ───────────────────────────── SCHEDULE MEETING ─────────────────────────────
function populateSmContact(leadId, selectedContactId){
  const contactSel = document.getElementById('smContact');
  const lead = data.leads.find(l => l.id === leadId);
  const contacts = lead && lead.root ? flattenOrdered(lead.root) : [];
  if (!contacts.length){
    contactSel.innerHTML = '<option value="">No contacts on this lead yet</option>';
    return;
  }
  contactSel.innerHTML = contacts.map(c => `<option value="${c.id}">${esc(c.name || 'Unnamed')}${c.role ? ' · ' + esc(c.role) : ''}</option>`).join('');
  if (selectedContactId) contactSel.value = selectedContactId;
}
function openScheduleMeeting(dateStr, meetingId, presetLeadId){
  smEditingId = meetingId || null;
  const sel = document.getElementById('smBrand');
  sel.innerHTML = data.leads.filter(l => !l.dead).map(l => `<option value="${l.id}">${esc(l.brand)}</option>`).join('') || '<option value="">No active leads yet</option>';

  const existing = meetingId ? data.meetings.find(m => m.id === meetingId) : null;
  document.getElementById('smTitle').textContent = existing ? 'Edit Meeting' : 'Schedule Meeting';
  document.getElementById('smDeleteWrap').style.display = existing ? 'flex' : 'none';

  if (existing){
    sel.value = existing.leadId;
    document.getElementById('smDate').value = existing.date;
    document.getElementById('smStart').value = existing.startTime;
    document.getElementById('smEnd').value = existing.endTime;
    document.getElementById('smLocation').value = existing.location || '';
    document.getElementById('smNotes').value = existing.notes || '';
    populateSmContact(existing.leadId, existing.contactId);
  } else {
    if (presetLeadId) sel.value = presetLeadId;
    document.getElementById('smDate').value = dateStr || selectedCalDate;
    document.getElementById('smStart').value = '';
    document.getElementById('smEnd').value = '';
    document.getElementById('smNotes').value = '';
    onSmBrandChange();
  }
  document.getElementById('scheduleMeetingScrim').classList.add('open');
  document.getElementById('scheduleMeetingSheet').classList.add('open');
}
function closeScheduleMeeting(){
  document.getElementById('scheduleMeetingScrim').classList.remove('open');
  document.getElementById('scheduleMeetingSheet').classList.remove('open');
}
function onSmBrandChange(){
  const leadId = document.getElementById('smBrand').value;
  const lead = data.leads.find(l => l.id === leadId);
  document.getElementById('smLocation').value = lead ? (lead.area || '') : '';
  populateSmContact(leadId);
}
function onSmStartChange(){
  const endEl = document.getElementById('smEnd');
  if (endEl.value) return;
  const start = document.getElementById('smStart').value;
  if (!start) return;
  const [h,mi] = start.split(':').map(Number);
  const d = new Date(); d.setHours(h+1, mi, 0, 0);
  endEl.value = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function submitScheduleMeeting(){
  const leadId = document.getElementById('smBrand').value;
  const lead = data.leads.find(l => l.id === leadId);
  if (!lead) return;
  const date = document.getElementById('smDate').value;
  const startTime = document.getElementById('smStart').value;
  const endTime = document.getElementById('smEnd').value;
  if (!date || !startTime || !endTime) return;
  const location = document.getElementById('smLocation').value.trim();
  const notes = document.getElementById('smNotes').value.trim();
  const contactId = document.getElementById('smContact').value;
  const contact = contactId && lead.root ? findNode(lead.root, contactId) : null;
  const contactName = contact ? contact.name : '';
  const contactPhone = contact ? contact.phone : '';

  if (smEditingId){
    const mt = data.meetings.find(m => m.id === smEditingId);
    if (mt) Object.assign(mt, { leadId, brand: lead.brand, location, date, startTime, endTime, notes, contactId, contactName, contactPhone });
  } else {
    data.meetings.push({ id: uid(), leadId, brand: lead.brand, location, date, startTime, endTime, notes, contactId, contactName, contactPhone, status: 'scheduled', createdAt: nowISO() });
  }
  save();
  closeScheduleMeeting();
  renderCalendar();
  if (selLeadId === leadId) renderLeadDetail();
}
function confirmMeeting(id){
  const mt = data.meetings.find(m => m.id === id); if (!mt) return;
  mt.status = 'confirmed';
  save();
  renderCalendar();
}
function deleteMeeting(id){
  data.meetings = data.meetings.filter(m => m.id !== id);
  save();
  closeScheduleMeeting();
  renderCalendar();
  if (selLeadId) renderLeadDetail();
}

let activeCallFilter = 'all';

  { key: 'all', label: 'Any Last Call' },

function renderLeadList(){
  document.getElementById('leadCount').textContent = `${data.leads.filter(l=>!l.dead).length} lead${data.leads.filter(l=>!l.dead).length!==1?'s':''}`;
  renderProgressBar('progressLabel', 'progressFill');
  const qRaw = (document.getElementById('searchInput').value || '').trim();
  const q = qRaw.toLowerCase();
  let list = [...data.leads];
  if (activeFilter !== 'all') list = list.filter(l => leadStatus(l) === activeFilter);
  if (activeCallFilter === 'none') list = list.filter(l => lastCallOutcome(l) === null);
  else if (activeCallFilter !== 'all') list = list.filter(l => lastCallOutcome(l) === activeCallFilter);
  if (q) list = list.filter(l => {
    const names = l.root ? flattenOrdered(l.root).map(n => n.name) : [];
    const hay = [l.brand, l.area, ...names].join(' ').toLowerCase();
    return hay.includes(q);
  });
  list.sort((a, b) => new Date(lastTouchISO(b)) - new Date(lastTouchISO(a)));

  const wrap = document.getElementById('leadListWrap');

    if (q) {

        <button class="setbtn setbtn-primary" style="margin-top:16px;" onclick="createFromSearch()">+ Create "${esc(qRaw)}" as a New Lead</button>
      </div>`;
    } else {
      wrap.innerHTML = `<div class="empty-state">
        <div class="empty-state-emoji">📋</div>

        <div class="empty-state-body">Tap the + button to add your first lead — brand name and a gatekeeper's number is all you need to start.</div>
      </div>`;
    }
    return;
  }
  wrap.innerHTML = list.map(l => {
    const st = leadStatus(l);
    const meta = statusMeta(st);
    const who = l.root ? `${l.root.name || 'Unnamed'}${l.root.role ? ' · ' + l.root.role : ''}` : 'No contact yet';
    const d = daysAgo(lastTouchISO(l));
    const waContact = findTargetNode(l.root) || l.root;
    const waBtn = (waContact && waContact.phone)
      ? `<button class="lc-wabtn" onclick="event.stopPropagation();sendBrandDetails('${l.id}')" title="Send brand details via WhatsApp">💬</button>`
      : '';
    return `<div class="leadcard" onclick="openLeadDetail('${l.id}')">
      <div class="lc-avatar">${esc(initials(l.brand))}</div>
      <div class="leadcard-main">
        <div class="leadcard-brand">${esc(l.brand)}</div>
        <div class="leadcard-sub">${esc(who) || '—'}</div>
      </div>
      <div class="leadcard-right">
        <span class="badge ${meta.cls}">${meta.label}</span>
        <div class="leadcard-days">${d === 0 ? 'today' : d === 1 ? '1d ago' : d + 'd ago'}</div>
      </div>
      ${waBtn}
      <div class="lc-chevron">›</div>
    </div>`;
  }).join('');
}

function renderTree(l){
  if (!l.root) {
    return `<div class="curcard">
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 4px;">No contacts added yet for this brand.</p>
      <button class="logbtn" onclick="openAddContact('ROOT', false)">+ Add First Gatekeeper</button>
    </div>`;
  }
  const order = flattenOrdered(l.root);
  const seq = new Map(order.map((n, i) => [n.id, i + 1]));
  function renderNode(n){
    const om = n.outcome ? NODE_OUTCOME_META[n.outcome] : null;
    const kids = n.children.slice().sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    return `
      <div class="node-card${n.isTarget ? ' target' : ''}" onclick="openNodeSheet('${n.id}')">
        <div class="node-seq">${seq.get(n.id)}</div>
        <div class="node-main">
          <div class="node-name">${esc(n.name) || 'Unnamed'}${n.isTarget ? ' ⭐' : ''}</div>
          ${n.role ? `<div class="node-role">${esc(n.role)}</div>` : ''}
          ${n.phone ? `<div class="node-phone">${esc(n.phone)}</div>` : ''}
          <div class="node-badges">
            ${om ? `<span class="badge ${om.cls}">${om.label}</span>` : `<span class="badge badge-new">Not Called Yet</span>`}
            ${n.isTarget ? `<span class="badge badge-closed" style="background:var(--violet-bg);color:var(--violet);">Marketing Manager</span>` : ''}
          </div>
        </div>
      </div>
      ${kids.length ? `<div class="node-children">${kids.map(renderNode).join('')}</div>` : ''}
    `;
  }
  return `<div class="section-label">Contact Chain — in order reached</div><div class="node-list">${renderNode(l.root)}</div>`;
}

    <button class="mtg-addbtn" onclick="openScheduleMeeting(null,null,'${l.id}')">+ Schedule Meeting</button>`;

function toggleTarget(){

function deleteNode(){

// ───────────────────────────── STATS (period-filtered analytics) ─────────────────────────────
let activePeriod = 'all';
const PERIODS = [
  { key: 'today', label: 'Today' },
  { key: 'week', label: 'This Week' },
  { key: 'month', label: 'This Month' },
  { key: 'all', label: 'All Time' },
];
function periodStart(key){
  const now = new Date();
  if (key === 'today') { const d = new Date(now); d.setHours(0,0,0,0); return d; }
  if (key === 'week') { const d = new Date(now); d.setHours(0,0,0,0); d.setDate(d.getDate() - d.getDay()); return d; }
  if (key === 'month') { const d = new Date(now); d.setHours(0,0,0,0); d.setDate(1); return d; }
  return null;
}
function setPeriod(k){ activePeriod = k; renderStats(); }
function renderPeriodChips(){
  document.getElementById('periodChips').innerHTML = PERIODS.map(p => `
    <button class="pchip${activePeriod === p.key ? ' active' : ''}" onclick="setPeriod('${p.key}')">${p.label}</button>
  `).join('');
}
function renderStats(){
  renderPeriodChips();
  renderProgressBar('statsProgressLabel', 'statsProgressFill');

  const start = periodStart(activePeriod);
  const inPeriod = iso => !start || new Date(iso) >= start;
  const periodLabel = activePeriod === 'all' ? 'all time' : PERIODS.find(p => p.key === activePeriod).label.toLowerCase();

  const leadsInPeriod = data.leads.filter(l => inPeriod(l.createdAt));
  const alive = data.leads.filter(l => !l.dead);
  const allNodes = data.leads.flatMap(l => l.root ? flattenOrdered(l.root) : []);
  const allCallsInPeriod = allNodes.flatMap(n => n.callLog.filter(c => inPeriod(c.at)));
  const dmReachedInPeriod = allNodes.filter(n => n.isTarget && n.outcome === 'reached' && n.loggedAt && inPeriod(n.loggedAt)).length;
  const closesInPeriod = data.leads.filter(l => l.closedSale && inPeriod(l.closedSale.closedAt));
  const revenueInPeriod = closesInPeriod.reduce((sum, l) => sum + (l.closedSale.amount || 0), 0);
  const deadEnds = allCallsInPeriod.filter(c => ['no_answer','wrong_number','refused'].includes(c.outcome)).length;
  const productiveRate = allCallsInPeriod.length ? Math.round(((allCallsInPeriod.length - deadEnds) / allCallsInPeriod.length) * 100) : 0;
  const noAnswer = allCallsInPeriod.filter(c => c.outcome === 'no_answer').length;
  const noAnswerRate = allCallsInPeriod.length ? Math.round((noAnswer / allCallsInPeriod.length) * 100) : 0;
  const totalClosedAllTime = data.leads.filter(l => l.closedSale).length;
  const totalRevenueAllTime = data.leads.reduce((sum, l) => sum + (l.closedSale ? l.closedSale.amount : 0), 0);

  const tiles = [
    { label: 'Leads Added', val: leadsInPeriod.length, sub: periodLabel },
    { label: 'Reached DM', val: dmReachedInPeriod, sub: periodLabel, tint: 'green' },
    { label: 'Closed Deals', val: closesInPeriod.length, sub: periodLabel, tint: 'violet' },
    { label: 'Calls Logged', val: allCallsInPeriod.length, sub: periodLabel },
  ];

  document.getElementById('statsContent').innerHTML = `
    <div class="revenue-hero">
      <div class="revenue-hero-label">Revenue — ${esc(periodLabel)}</div>
      <div class="revenue-hero-amt sg">${money(revenueInPeriod)}</div>
      <div class="revenue-hero-sub">${closesInPeriod.length} closed deal${closesInPeriod.length!==1?'s':''} in this period · ${totalClosedAllTime} closed all-time (${money(totalRevenueAllTime)})</div>
    </div>
    <div class="statgrid">
      ${tiles.map(t => `
        <div class="stattile${t.tint ? ' ' + t.tint : ''}">
          <div class="stattile-label">${t.label}</div>
          <div class="stattile-val sg">${t.val}</div>
          <div class="stattile-sub">${t.sub}</div>
        </div>`).join('')}
    </div>
    <div class="statgrid" style="grid-template-columns:1fr 1fr;">
      <div class="stattile"><div class="stattile-label">Total Leads</div><div class="stattile-val sg">${data.leads.length}</div><div class="stattile-sub">all time · ${data.leads.filter(l=>l.dead).length} dead</div></div>
      <div class="stattile"><div class="stattile-label">Active Leads</div><div class="stattile-val sg">${alive.length}</div><div class="stattile-sub">not marked dead</div></div>
    </div>
    <div class="ratecard">
      <div class="ratecard-label">Productive Call Rate</div>
      <div class="ratecard-val green sg">${productiveRate}%</div>
      <div class="ratecard-sub">led to more info or a contact · ${periodLabel}</div>
      <div class="ratebar-track"><div class="ratebar-fill green" style="width:${productiveRate}%"></div></div>
    </div>
    <div class="ratecard">
      <div class="ratecard-label">No-Answer Rate</div>
      <div class="ratecard-val amber sg">${noAnswerRate}%</div>
      <div class="ratecard-sub">${noAnswer} of ${allCallsInPeriod.length} calls · ${periodLabel}</div>
      <div class="ratebar-track"><div class="ratebar-fill amber" style="width:${noAnswerRate}%"></div></div>
    </div>
    <div class="calllog-entry" onclick="openCallLog()" style="cursor:pointer;">
      <div class="calllog-entry-l">📞 Call Log — every call with date &amp; time</div>
      <div class="calllog-entry-r">›</div>
    </div>
  `;
}

  if (!v || v <= 0) return;

async function exportData(){
  const payload = JSON.stringify(data, null, 2);
  const filename = `fama-leads-${new Date().toISOString().slice(0,10)}.json`;
  const file = new File([payload], filename, { type: 'application/json' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Fama Leads Backup' });
      data.lastBackupAt = nowISO(); save(); renderSettings();
      return;
    } catch (e) { /* user cancelled or share failed — fall back below */ }
  }
  // fallback: plain download link
  const url = URL.createObjectURL(new Blob([payload], { type: 'application/json' }));
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  data.lastBackupAt = nowISO(); save(); renderSettings();
}

document.getElementById('importFile').addEventListener('change', function(){
  const f = this.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      const incomingLeads = (Array.isArray(incoming.leads) ? incoming.leads : []).map(migrateLead).map(ensureLeadDefaults);
      const existingIds = new Set(data.leads.map(l => l.id));
      let added = 0;
      incomingLeads.forEach(l => { if (!existingIds.has(l.id)) { data.leads.push(l); added++; } });

      const incomingMeetings = Array.isArray(incoming.meetings) ? incoming.meetings : [];
      const existingMeetingIds = new Set(data.meetings.map(m => m.id));
      let meetingsAdded = 0;
      incomingMeetings.forEach(mt => { if (!existingMeetingIds.has(mt.id)) { data.meetings.push(mt); meetingsAdded++; } });

      save();
      alert(`Imported ${added} new lead${added!==1?'s':''} and ${meetingsAdded} new meeting${meetingsAdded!==1?'s':''}. ${incomingLeads.length - added} lead(s) already existed and were skipped.`);
      renderLeadList();
    } catch (e) {
      alert('Could not read that file — make sure it\'s a Fama Leads export.');
    }
    document.getElementById('importFile').value = '';
  };
  reader.readAsText(f);
});

function clearAllData(){
  if (!confirm('Erase ALL leads from this phone? This cannot be undone.')) return;
  if (!confirm('Really sure? Export a backup first if you haven\'t.')) return;
  data = { leads: [], settings: data.settings, lastBackupAt: data.lastBackupAt };
  save();
  renderLeadList(); renderSettings();
}

// ───────────────────────────── VIEWPORT HEIGHT FIX ─────────────────────────────
// Some iOS/WebKit builds under-report the usable viewport (window.innerHeight /
// visualViewport.height) below the true device height (window.screen.height) without
// exposing the shortfall via env(safe-area-inset-bottom) — leaving dead space at the
// bottom that no CSS safe-area handling can account for. Detect that shortfall directly
// and (a) size #app to the true screen height instead, (b) reuse the measured shortfall
// as the effective bottom safe-area padding for the tab bar / FAB / sheets. A real keyboard
// opening is distinguished by a much larger shrink and is left alone so content isn't
// hidden behind it.
function syncAppHeight(){
  const vvH = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  const screenH = window.screen.height;
  const gap = screenH - vvH;
  const keyboardLikelyOpen = gap > 150;
  const h = keyboardLikelyOpen ? vvH : Math.max(vvH, screenH);
  document.documentElement.style.setProperty('--app-height', h + 'px');
  if (!keyboardLikelyOpen && gap > 0) {
    document.documentElement.style.setProperty('--safe-b', gap + 'px');
  }
}
syncAppHeight();
window.addEventListener('resize', syncAppHeight);
window.addEventListener('orientationchange', syncAppHeight);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', syncAppHeight);
  window.visualViewport.addEventListener('scroll', syncAppHeight);
}

// ───────────────────────────── INIT ─────────────────────────────
load();
renderFilterChips();
renderCallFilterChips();
renderLeadList();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
