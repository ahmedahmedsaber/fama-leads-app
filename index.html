<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Fama Leads</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#014AAD">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fama Leads">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<link rel="icon" href="icons/favicon-32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#014AAD; --bg:#EEF4FA; --card:#fff; --border:#E1EBF4;
  --ink:#0f1b2e; --muted:#66768c; --muted2:#9aabb8;
  --green:#1fa872; --green-bg:#e5f7ee;
  --red:#e5484d; --red-bg:#fdecec;
  --amber:#c47a1f; --amber-bg:#fdf3e2;
  --gold:#eab308; --gold-bg:#fffbea;
  --blue-bg:#e8f0fb;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
button,input,textarea,select{font-family:inherit;}
input,textarea{font-size:16px;} /* prevent iOS auto-zoom */

#app{position:fixed;inset:0;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{flex:0 0 auto;padding:calc(var(--safe-t) + 16px) 18px 10px;background:var(--navy);color:#fff;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:21px;font-weight:800;letter-spacing:-.02em;}
.topbar-count{font-size:12px;color:rgba(255,255,255,.65);font-weight:600;margin-top:1px;}
.searchbar{margin-top:12px;position:relative;}
.searchbar input{width:100%;padding:10px 14px;border-radius:11px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:15px;outline:none;}
.searchbar input::placeholder{color:rgba(255,255,255,.6);}
.chiprow{display:flex;gap:7px;margin-top:11px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.chiprow::-webkit-scrollbar{display:none;}
.fchip{flex:0 0 auto;padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);border:none;white-space:nowrap;}
.fchip.active{background:#fff;color:var(--navy);}

/* DAILY GOAL PROGRESS */
.progress-wrap{margin-top:12px;}
.progress-label{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:5px;}
.progress-label b{color:#fff;font-weight:800;}
.progress-track{height:7px;border-radius:99px;background:rgba(255,255,255,.2);overflow:hidden;}
.progress-fill{height:100%;background:#fff;border-radius:99px;transition:width .3s ease;}
.progress-fill.hit{background:#7CF29A;}

/* VIEWS */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view.active{display:block;}

/* LEAD LIST */
.leadlist{padding:12px 14px calc(90px + var(--safe-b));}
.leadcard{background:var(--card);border-radius:15px;padding:13px 14px;margin-bottom:9px;box-shadow:0 1px 3px rgba(15,27,46,.06);display:flex;align-items:center;gap:11px;}
.leadcard:active{background:#f5f9fd;}
.leadcard-main{flex:1;min-width:0;}
.leadcard-brand{font-size:15.5px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leadcard-sub{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leadcard-right{flex:0 0 auto;text-align:right;}
.badge{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap;}
.badge-new{background:var(--blue-bg);color:var(--navy);}
.badge-progress{background:var(--amber-bg);color:var(--amber);}
.badge-dm{background:var(--green-bg);color:var(--green);}
.badge-dead{background:#eee;color:#8a99a8;}
.leadcard-days{font-size:10.5px;color:var(--muted2);margin-top:5px;}
.empty-state{text-align:center;padding:70px 30px;color:var(--muted);}
.empty-state-emoji{font-size:44px;margin-bottom:10px;}
.empty-state-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:6px;}
.empty-state-body{font-size:13.5px;line-height:1.6;}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(78px + var(--safe-b));width:58px;height:58px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:28px;font-weight:400;box-shadow:0 8px 20px rgba(1,74,173,.4);display:grid;place-items:center;z-index:50;}
.fab:active{transform:scale(.94);}

/* TAB BAR */
.tabbar{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid var(--border);padding:6px 0 calc(6px + var(--safe-b));position:relative;z-index:40;}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:6px 0;color:var(--muted2);}
.tabbtn.active{color:var(--navy);}
.tabbtn .ic{font-size:20px;line-height:1;}
.tabbtn .lb{font-size:10px;font-weight:700;}

/* SCREEN OVERLAY (lead detail, full screen push) */
.screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.screen.open{display:flex;transform:translateX(0);}
.screen-header{flex:0 0 auto;background:var(--navy);color:#fff;padding:calc(var(--safe-t) + 14px) 14px 14px;display:flex;align-items:center;gap:10px;}
.iconbtn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.14);border:none;color:#fff;font-size:17px;display:grid;place-items:center;flex:0 0 34px;}
.screen-header-title{flex:1;min-width:0;}
.screen-header-brand{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.screen-header-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:1px;}
.screen-body{flex:1;overflow-y:auto;padding:14px 16px calc(30px + var(--safe-b));-webkit-overflow-scrolling:touch;}

/* RESOLVED / DEAD BANNERS */
.resolved-card{background:var(--green-bg);border-radius:18px;padding:18px;text-align:center;}
.resolved-card .big{font-size:30px;margin-bottom:6px;}
.resolved-card .t{font-weight:800;color:var(--green);font-size:15px;}
.deadcard{background:#f3f3f3;border-radius:18px;padding:16px;text-align:center;color:var(--muted);font-size:13.5px;}
.curcard{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(15,27,46,.08);text-align:center;}
.curcard-actions{display:flex;gap:9px;margin-top:14px;}
.pillbtn{flex:1;padding:11px;border-radius:12px;border:none;font-size:13.5px;font-weight:800;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.pillbtn-call{background:var(--navy);color:#fff;}
.pillbtn-wa{background:var(--green-bg);color:var(--green);}
.curcard-phone{display:block;font-size:19px;font-weight:800;color:var(--navy);text-decoration:none;margin-top:4px;}
.curcard-role{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--blue-bg);color:var(--navy);margin-bottom:6px;}
.logbtn{display:block;width:100%;margin-top:16px;padding:14px;border-radius:13px;border:none;background:var(--ink);color:#fff;font-size:14.5px;font-weight:800;}

.section-label{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:20px 0 9px;}

/* CONTACT TREE */
.node-list{display:flex;flex-direction:column;}
.node-card{position:relative;display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:14px;padding:12px 13px;margin:6px 0;box-shadow:0 1px 3px rgba(15,27,46,.06);}
.node-card:active{background:#f5f9fd;}
.node-card.target{border:1.5px solid var(--gold);background:var(--gold-bg);}
.node-seq{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--navy);font-size:10.5px;font-weight:800;display:grid;place-items:center;flex:0 0 22px;margin-top:1px;}
.node-card.target .node-seq{background:var(--gold);color:#fff;}
.node-main{flex:1;min-width:0;}
.node-name{font-size:14.5px;font-weight:800;}
.node-role{font-size:11.5px;color:var(--muted);margin-top:1px;}
.node-phone{font-size:11.5px;color:var(--navy);margin-top:2px;font-weight:600;}
.node-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.node-children{margin-left:26px;border-left:2px dashed var(--border);padding-left:14px;}

.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;background:#fff;outline:none;color:var(--ink);}
.fi:focus{border-color:var(--navy);}
textarea.fi{min-height:70px;resize:vertical;}
.rowbtns{display:flex;gap:10px;}
.rowbtns .fg{flex:1;}

.miniaction{display:flex;gap:9px;margin-top:18px;}
.miniaction button{flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--border);background:#fff;font-size:12.5px;font-weight:700;color:var(--muted);}
.miniaction button.danger{color:var(--red);border-color:#f5c6c7;}
.miniaction button.revive{color:var(--green);border-color:#bfe6d3;}

/* BOTTOM SHEETS */
.sheet-scrim{position:fixed;inset:0;background:rgba(15,27,46,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.sheet-scrim.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;z-index:210;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:#e1e8f0;border-radius:99px;margin:10px auto 4px;}
.sheet-title{font-size:17px;font-weight:800;padding:8px 20px 4px;}
.sheet-body{padding:6px 20px calc(24px + var(--safe-b));overflow-y:auto;}
.sheet-save{display:block;width:100%;padding:14px;border-radius:13px;border:none;background:var(--navy);color:#fff;font-size:15px;font-weight:800;margin-top:6px;}
.sheet-cancel{display:block;width:100%;padding:12px;border-radius:13px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:700;text-align:center;}

.outcomelist{display:flex;flex-direction:column;gap:8px;}
.ocbtn{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:14px;border:1.5px solid var(--border);background:#fff;text-align:left;font-size:14.5px;font-weight:700;color:var(--ink);width:100%;}
.ocbtn .ic{font-size:20px;flex:0 0 24px;}
.ocbtn.ok{border-color:#bfe6d3;background:var(--green-bg);}
.ocbtn.warn{border-color:#f0dab3;background:var(--amber-bg);}
.ocbtn.bad{border-color:#f5c6c7;background:var(--red-bg);}

/* STATS — blue analytics page */
#view-stats{background:var(--navy);}
.statshead{padding:calc(var(--safe-t) + 20px) 18px 6px;color:#fff;}
.statshead-title{font-size:22px;font-weight:800;}
.statshead-sub{font-size:12.5px;color:rgba(255,255,255,.65);margin-top:2px;}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:16px 14px calc(90px + var(--safe-b));}
.stattile{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.stattile-label{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.stattile-val{font-size:27px;font-weight:800;color:var(--navy);margin-top:5px;letter-spacing:-.02em;}
.stattile-sub{font-size:11px;color:var(--muted2);margin-top:2px;}
.stattile.wide{grid-column:span 2;}

/* SETTINGS */
.setshead{padding:calc(var(--safe-t) + 20px) 18px 8px;}
.setshead-title{font-size:20px;font-weight:800;color:var(--ink);}
.settingswrap{padding:6px 16px calc(90px + var(--safe-b));}
.setcard{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(15,27,46,.06);}
.setcard-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.setcard-body{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:12px;}
.setbtn{display:block;width:100%;padding:12px;border-radius:12px;border:none;font-size:13.5px;font-weight:800;text-align:center;margin-bottom:8px;}
.setbtn:last-child{margin-bottom:0;}
.setbtn-primary{background:var(--navy);color:#fff;}
.setbtn-ghost{background:var(--blue-bg);color:var(--navy);}
.setbtn-danger{background:var(--red-bg);color:var(--red);}
.backup-warn{background:var(--amber-bg);color:#8a5a10;border-radius:12px;padding:11px 13px;font-size:12px;font-weight:600;margin-bottom:12px;}
.backup-ok{background:var(--green-bg);color:var(--green);border-radius:12px;padding:11px 13px;font-size:12px;font-weight:600;margin-bottom:12px;}
input[type=file]{display:none;}
</style>
</head>
<body>

<div id="app">
  <div class="topbar" id="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">Fama Leads</div>
        <div class="topbar-count" id="leadCount">0 leads</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">Today's Goal <b>0 / 50</b></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="searchbar"><input id="searchInput" placeholder="Search brand or contact name…" oninput="renderLeadList()"></div>
    <div class="chiprow" id="filterChips"></div>
  </div>

  <div class="view active" id="view-leads">
    <div class="leadlist" id="leadListWrap"></div>
  </div>

  <div class="view" id="view-stats">
    <div class="statshead">
      <div class="statshead-title">📊 Analytics</div>
      <div class="statshead-sub">Your outreach performance</div>
      <div class="progress-wrap">
        <div class="progress-label" id="statsProgressLabel">Today's Goal <b>0 / 50</b></div>
        <div class="progress-track"><div class="progress-fill" id="statsProgressFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="statgrid" id="statGrid"></div>
  </div>

  <div class="view" id="view-settings">
    <div class="setshead"><div class="setshead-title">⚙️ Backup & Settings</div></div>
    <div class="settingswrap" id="settingsWrap"></div>
  </div>

  <nav class="tabbar">
    <button class="tabbtn active" data-view="leads" onclick="switchView('leads')"><span class="ic">🏠</span><span class="lb">Leads</span></button>
    <button class="tabbtn" data-view="stats" onclick="switchView('stats')"><span class="ic">📊</span><span class="lb">Stats</span></button>
    <button class="tabbtn" data-view="settings" onclick="switchView('settings')"><span class="ic">⚙️</span><span class="lb">Backup</span></button>
  </nav>

  <button class="fab" id="fabAdd" onclick="openAddLead()">+</button>
</div>

<!-- LEAD DETAIL SCREEN -->
<div class="screen" id="leadDetailScreen">
  <div class="screen-header">
    <button class="iconbtn" onclick="closeLeadDetail()">←</button>
    <div class="screen-header-title">
      <div class="screen-header-brand" id="ldBrand"></div>
      <div class="screen-header-sub" id="ldSub"></div>
    </div>
    <button class="iconbtn" onclick="openEditLead()">✎</button>
  </div>
  <div class="screen-body" id="ldBody"></div>
</div>

<!-- ADD LEAD SHEET -->
<div class="sheet-scrim" id="addLeadScrim" onclick="closeAddLead()"></div>
<div class="sheet" id="addLeadSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New Lead</div>
  <div class="sheet-body">
    <div class="fg"><label class="fl">Brand Name *</label><input class="fi" id="alBrand" placeholder="e.g. Buffalo Burger Almaza"></div>
    <div class="fg"><label class="fl">Gatekeeper Name</label><input class="fi" id="alName" placeholder="e.g. Ahmed Ali"></div>
    <div class="rowbtns">
      <div class="fg"><label class="fl">Phone</label><input class="fi" id="alPhone" type="tel" placeholder="01xxxxxxxxx"></div>
      <div class="fg"><label class="fl">Role</label><input class="fi" id="alRole" placeholder="HR Manager"></div>
    </div>
    <div class="fg"><label class="fl">Area (optional)</label><input class="fi" id="alArea" placeholder="e.g. Almaza"></div>
    <button class="sheet-save" onclick="submitAddLead()">Save Lead</button>
    <button class="sheet-cancel" onclick="closeAddLead()">Cancel</button>
  </div>
</div>

<!-- EDIT LEAD SHEET -->
<div class="sheet-scrim" id="editLeadScrim" onclick="closeEditLead()"></div>
<div class="sheet" id="editLeadSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Edit Lead</div>
  <div class="sheet-body">
    <div class="fg"><label class="fl">Brand Name</label><input class="fi" id="elBrand"></div>
    <div class="fg"><label class="fl">Area</label><input class="fi" id="elArea"></div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="elNotes"></textarea></div>
    <button class="sheet-save" onclick="submitEditLead()">Save Changes</button>
    <button class="sheet-cancel" onclick="closeEditLead()">Cancel</button>
  </div>
</div>

<!-- CONTACT NODE ACTION SHEET -->
<div class="sheet-scrim" id="nodeScrim" onclick="closeNodeSheet()"></div>
<div class="sheet" id="nodeSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="nodeSheetTitle">Contact</div>
  <div class="sheet-body" id="nodeSheetBody"></div>
</div>

<!-- ADD CONTACT (gatekeeper / marketing manager) SHEET -->
<div class="sheet-scrim" id="addContactScrim" onclick="closeAddContact()"></div>
<div class="sheet" id="addContactSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="addContactTitle">Add Gatekeeper</div>
  <div class="sheet-body">
    <div class="fg"><label class="fl">Name</label><input class="fi" id="acName" placeholder="e.g. Samir Abdelwahab"></div>
    <div class="rowbtns">
      <div class="fg"><label class="fl">Phone</label><input class="fi" id="acPhone" type="tel" placeholder="01xxxxxxxxx"></div>
      <div class="fg"><label class="fl">Role</label><input class="fi" id="acRole" placeholder="Branch Manager"></div>
    </div>
    <button class="sheet-save" onclick="submitAddContact()">Add Contact</button>
    <button class="sheet-cancel" onclick="closeAddContact()">Cancel</button>
  </div>
</div>

<!-- EDIT CONTACT SHEET -->
<div class="sheet-scrim" id="editNodeScrim" onclick="closeEditNode()"></div>
<div class="sheet" id="editNodeSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Edit Contact</div>
  <div class="sheet-body">
    <div class="fg"><label class="fl">Name</label><input class="fi" id="enName"></div>
    <div class="rowbtns">
      <div class="fg"><label class="fl">Phone</label><input class="fi" id="enPhone" type="tel"></div>
      <div class="fg"><label class="fl">Role</label><input class="fi" id="enRole"></div>
    </div>
    <div class="fg"><label class="fl">Note</label><textarea class="fi" id="enNote"></textarea></div>
    <button class="sheet-save" onclick="submitEditNode()">Save Changes</button>
    <button class="sheet-cancel" onclick="closeEditNode()">Cancel</button>
  </div>
</div>

<input type="file" id="importFile" accept="application/json">

<script>
// ───────────────────────────── STORAGE ─────────────────────────────
const STORE_KEY = 'fama_leads_v1';
let data = { leads: [], settings: { dailyTarget: 50 }, lastBackupAt: null };

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const nowISO = () => new Date().toISOString();
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function daysAgo(iso){ if(!iso) return null; return Math.floor((Date.now() - new Date(iso)) / 86400000); }
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }

// migrate a lead from the old flat `chain` array to the new contact tree (`root` + nested `children`)
function migrateLead(l){
  if (l.root !== undefined) return l; // already new format
  const chain = Array.isArray(l.chain) ? l.chain : [];
  let root = null, cursor = null;
  chain.forEach(c => {
    const node = {
      id: uid(), name: c.name || '', role: c.role || '', phone: c.phone || '', note: c.note || '',
      outcome: c.outcome === 'referred' ? null : (c.outcome === 'reached_dm' ? 'reached' : (c.outcome || null)),
      loggedAt: c.loggedAt || null,
      isTarget: c.outcome === 'reached_dm',
      createdAt: c.loggedAt || l.createdAt || nowISO(),
      children: [],
    };
    if (!root) root = node; else cursor.children.push(node);
    cursor = node;
  });
  delete l.chain;
  l.root = root;
  return l;
}

function load(){
  try { data = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch { data = {}; }
  if (!Array.isArray(data.leads)) data.leads = [];
  if (!data.settings || typeof data.settings !== 'object') data.settings = {};
  if (typeof data.settings.dailyTarget !== 'number' || data.settings.dailyTarget <= 0) data.settings.dailyTarget = 50;
  if (!('lastBackupAt' in data)) data.lastBackupAt = null;
  data.leads = data.leads.map(migrateLead);
  save();
}

const NODE_OUTCOME_META = {
  no_answer:    { label: 'No Answer',      cls: 'badge-progress' },
  wrong_number: { label: 'Wrong Number',   cls: 'badge-dead' },
  refused:      { label: 'Refused',        cls: 'badge-dead' },
  callback:     { label: 'Callback Later', cls: 'badge-progress' },
  reached:      { label: 'Reached',        cls: 'badge-dm' },
};

// ───────────────────────────── TREE HELPERS ─────────────────────────────
function findNode(node, id){
  if (!node) return null;
  if (node.id === id) return node;
  for (const c of node.children) { const f = findNode(c, id); if (f) return f; }
  return null;
}
function removeNodeFromTree(node, id){
  if (!node) return;
  node.children = node.children.filter(c => c.id !== id);
  node.children.forEach(c => removeNodeFromTree(c, id));
}
function flattenOrdered(root){
  const out = [];
  function walk(n){
    out.push(n);
    n.children.slice().sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt)).forEach(walk);
  }
  if (root) walk(root);
  return out;
}
function findTargetReached(node){
  if (!node) return false;
  if (node.isTarget && node.outcome === 'reached') return true;
  return node.children.some(findTargetReached);
}
function findTargetNode(node){
  if (!node) return null;
  if (node.isTarget && node.outcome === 'reached') return node;
  for (const c of node.children) { const f = findTargetNode(c); if (f) return f; }
  return null;
}

// ───────────────────────────── LEAD HELPERS ─────────────────────────────
function leadStatus(lead){
  if (lead.dead) return 'dead';
  if (!lead.root) return 'new';
  if (findTargetReached(lead.root)) return 'reached_dm';
  if (lead.root.outcome === null && lead.root.children.length === 0) return 'new';
  return 'in_progress';
}
function statusMeta(status){
  return {
    new:          { label: 'New',          cls: 'badge-new' },
    in_progress:  { label: 'In Progress',  cls: 'badge-progress' },
    reached_dm:   { label: 'Reached DM',   cls: 'badge-dm' },
    dead:         { label: 'Dead',         cls: 'badge-dead' },
  }[status];
}
function lastTouchISO(lead){
  if (!lead.root) return lead.createdAt;
  const touched = flattenOrdered(lead.root).filter(n => n.loggedAt);
  if (!touched.length) return lead.createdAt;
  return touched.reduce((a,b) => new Date(a.loggedAt) > new Date(b.loggedAt) ? a : b).loggedAt;
}
function leadsAddedToday(){
  const today = new Date(); today.setHours(0,0,0,0);
  return data.leads.filter(l => new Date(l.createdAt) >= today).length;
}

function renderTree(l){
  if (!l.root) {
    return `<div class="curcard">
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 4px;">No contacts added yet for this brand.</p>
      <button class="logbtn" onclick="openAddContact('ROOT', false)">+ Add First Gatekeeper</button>
    </div>`;
  }
  const order = flattenOrdered(l.root);
  const seq = new Map(order.map((n, i) => [n.id, i + 1]));
  function renderNode(n){
    const om = n.outcome ? NODE_OUTCOME_META[n.outcome] : null;
    const kids = n.children.slice().sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    return `
      <div class="node-card${n.isTarget ? ' target' : ''}" onclick="openNodeSheet('${n.id}')">
        <div class="node-seq">${seq.get(n.id)}</div>
        <div class="node-main">
          <div class="node-name">${esc(n.name) || 'Unnamed'}${n.isTarget ? ' ⭐' : ''}</div>
          ${n.role ? `<div class="node-role">${esc(n.role)}</div>` : ''}
          ${n.phone ? `<div class="node-phone">${esc(n.phone)}</div>` : ''}
          <div class="node-badges">
            ${om ? `<span class="badge ${om.cls}">${om.label}</span>` : `<span class="badge badge-new">Not Called Yet</span>`}

          </div>
        </div>
      </div>
      ${kids.length ? `<div class="node-children">${kids.map(renderNode).join('')}</div>` : ''}
    `;
  }
  return `<div class="section-label">Contact Chain — in order reached</div><div class="node-list">${renderNode(l.root)}</div>`;
}

// ───────────────────────────── STATS ─────────────────────────────
function renderStats(){
  const alive = data.leads.filter(l => !l.dead);
  const dead = data.leads.filter(l => l.dead);
  const reachedDm = alive.filter(l => findTargetReached(l.root));
  const allNodes = data.leads.flatMap(l => l.root ? flattenOrdered(l.root) : []);
  const allCalls = allNodes.filter(n => n.outcome);
  const today = new Date(); today.setHours(0,0,0,0);
  const weekStart = new Date(today); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const callsToday = allCalls.filter(c => new Date(c.loggedAt) >= today).length;
  const callsWeek = allCalls.filter(c => new Date(c.loggedAt) >= weekStart).length;
  const deadEnds = allCalls.filter(c => ['no_answer','wrong_number','refused'].includes(c.outcome)).length;
  const productiveRate = allCalls.length ? Math.round(((allCalls.length - deadEnds) / allCalls.length) * 100) : 0;
  const noAnswer = allCalls.filter(c => c.outcome === 'no_answer').length;
  const noAnswerRate = allCalls.length ? Math.round((noAnswer / allCalls.length) * 100) : 0;

  const tiles = [
    { label: 'Total Leads', val: data.leads.length, sub: `${dead.length} dead` },
    { label: 'Added Today', val: leadsAddedToday(), sub: `goal ${data.settings.dailyTarget}/day` },
    { label: 'Reached DM', val: reachedDm.length, sub: `of ${alive.length} active` },
    { label: 'Total Calls Logged', val: allCalls.length, sub: `${callsToday} today · ${callsWeek} this week` },
    { label: 'Productive Call Rate', val: productiveRate + '%', sub: 'led to more info or a contact', wide: true },
    { label: 'No-Answer Rate', val: noAnswerRate + '%', sub: `${noAnswer} of ${allCalls.length} calls`, wide: true },
  ];
  document.getElementById('statGrid').innerHTML = tiles.map(t => `
    <div class="stattile${t.wide ? ' wide' : ''}">
      <div class="stattile-label">${t.label}</div>
      <div class="stattile-val">${t.val}</div>
      <div class="stattile-sub">${t.sub}</div>
    </div>`).join('');
  renderProgressBar('statsProgressLabel', 'statsProgressFill');
}

      <div class="setcard-title">Backup Your Data</div>
      ${warnHtml}
      <div class="setcard-body">Everything is stored only on this phone. Export a file anytime and send it to your laptop via AirDrop, Files, or Mail.</div>
      <button class="setbtn setbtn-primary" onclick="exportData()">⬆️ Export Leads (.json)</button>
    </div>
    <div class="setcard">
      <div class="setcard-title">Import Leads</div>
      <div class="setcard-body">Bring in a previously exported file. New leads are added; leads that already exist here are left untouched.</div>
      <button class="setbtn setbtn-ghost" onclick="document.getElementById('importFile').click()">⬇️ Import .json File</button>
    </div>
    <div class="setcard">
      <div class="setcard-title">Danger Zone</div>
      <div class="setcard-body">Permanently erase all leads from this phone. Cannot be undone — export a backup first.</div>
      <button class="setbtn setbtn-danger" onclick="clearAllData()">Erase All Data</button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--muted2);margin-top:6px;">Fama Leads · data stays on this device</div>
  `;
}
function saveGoal(){
  const v = parseInt(document.getElementById('setGoalInput').value, 10);
  if (!v || v <= 0) return;
  data.settings.dailyTarget = v;
  save();
  renderLeadList();
}

async function exportData(){
  const payload = JSON.stringify(data, null, 2);
  const filename = `fama-leads-${new Date().toISOString().slice(0,10)}.json`;
  const file = new File([payload], filename, { type: 'application/json' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Fama Leads Backup' });
      data.lastBackupAt = nowISO(); save(); renderSettings();
      return;
    } catch (e) { /* user cancelled or share failed — fall back below */ }
  }
  // fallback: plain download link
  const url = URL.createObjectURL(new Blob([payload], { type: 'application/json' }));
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  data.lastBackupAt = nowISO(); save(); renderSettings();
}

document.getElementById('importFile').addEventListener('change', function(){
  const f = this.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      const incomingLeads = (Array.isArray(incoming.leads) ? incoming.leads : []).map(migrateLead);
      const existingIds = new Set(data.leads.map(l => l.id));
      let added = 0;
      incomingLeads.forEach(l => { if (!existingIds.has(l.id)) { data.leads.push(l); added++; } });
      save();
      alert(`Imported ${added} new lead${added!==1?'s':''}. ${incomingLeads.length - added} already existed and were skipped.`);
      renderLeadList();
    } catch (e) {
      alert('Could not read that file — make sure it\'s a Fama Leads export.');
    }
    document.getElementById('importFile').value = '';
  };
  reader.readAsText(f);
});

function clearAllData(){
  if (!confirm('Erase ALL leads from this phone? This cannot be undone.')) return;
  if (!confirm('Really sure? Export a backup first if you haven\'t.')) return;
  data = { leads: [], settings: data.settings, lastBackupAt: data.lastBackupAt };
  save();
  renderLeadList(); renderSettings();
}

// ───────────────────────────── INIT ─────────────────────────────
load();
renderFilterChips();
renderLeadList();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
